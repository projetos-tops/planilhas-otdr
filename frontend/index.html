<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Lançamento System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📊 Pré-Lançamento System</h1>
            <p>Selecione a pasta principal com as subpastas de bobinas</p>
        </header>

        <main class="main">
            <div class="form-card">
                <div class="form-group">
                    <label>📁 Pasta Principal</label>
                    <button id="selectPastaBtn" class="btn-secondary">Selecionar Pasta</button>
                    <div id="pastaInfo" class="pasta-info"></div>
                </div>

                <div class="form-group">
                    <label>👤 Operador</label>
                    <input type="text" id="operador" placeholder="Nome do operador" class="input-field">
                </div>

                <div class="form-group">
                    <label>📏 Comprimento da Bobina (m)</label>
                    <input type="number" id="comprimento" placeholder="Ex: 2000" class="input-field">
                </div>

                <!-- Apenas lista de pastas (sem detalhes dos arquivos) -->
                <div id="pastasList" class="pastas-list"></div>

                <button id="processarBtn" class="btn-primary">▶ PROCESSAR TODAS AS PASTAS</button>
            </div>

            <div id="progressSection" style="display: none;">
                <div class="progress-card">
                    <h3>Processando...</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <p id="progressStatus"></p>
                </div>
            </div>

            <div id="resultSection" style="display: none;">
                <div class="result-card">
                    <div class="result-icon">✅</div>
                    <h3>Processamento Concluído!</h3>
                    <p id="resultMessage"></p>
                    <button id="downloadBtn" class="btn-primary">📥 Baixar Planilhas</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
